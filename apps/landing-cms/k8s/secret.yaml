apiVersion: v1
kind: Secret
metadata:
  name: landing-cms-secrets
  labels:
    app: landing-cms
type: Opaque
stringData:
  # Строка подключения к PostgreSQL
  # Формат: Host=<host>;Database=<database>;Username=<username>;Password=<password>;SearchPath=piranha
  # ВАЖНО: В продакшене используйте внешние системы управления секретами (Vault, Sealed Secrets и т.д.)
  db-connection-string: "Host=postgres;Database=learning_platform;Username=postgres;Password=CHANGE_ME;SearchPath=piranha"
