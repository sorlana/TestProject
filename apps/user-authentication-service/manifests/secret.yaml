apiVersion: v1
kind: Secret
metadata:
  name: user-authentication-secrets
type: Opaque
stringData:
  # JWT Secret Key (должен быть заменен на реальный в продакшене)
  Jwt__SecretKey: "your-super-secret-jwt-key-change-this-in-production-min-32-chars"
  
  # Google OAuth (должны быть заменены на реальные в продакшене)
  Google__ClientId: "your-google-client-id"
  Google__ClientSecret: "your-google-client-secret"
  
  # SMS Provider (должны быть заменены на реальные в продакшене)
  Sms__ApiKey: "your-sms-provider-api-key"
  Sms__ApiUrl: "https://sms-provider.example.com/api"
  
  # nopCommerce API Key (должен быть заменен на реальный в продакшене)
  NopCommerce__ApiKey: "your-nopcommerce-api-key"
  
  # RabbitMQ Password
  RabbitMQ__Password: "guest"
