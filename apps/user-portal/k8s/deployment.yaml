apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-portal
  labels:
    app: user-portal
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-portal
  template:
    metadata:
      labels:
        app: user-portal
        component: frontend
    spec:
      containers:
      - name: user-portal
        image: user-portal:latest
        ports:
        - containerPort: 80
          name: http
        # Ограничения ресурсов
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # Проверки здоровья
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        # Переменные окружения (если потребуются)
        env:
        - name: NODE_ENV
          value: "production"
      # Стратегия развертывания
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1
      # Настройки безопасности
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx пользователь
        fsGroup: 101