version: '3.8'

services:
  user-portal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - VITE_API_BASE_URL=http://user-authentication-service
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
    networks:
      - testproject_default
    depends_on:
      - user-authentication-service
    restart: unless-stopped

  # Прокси для подключения к существующему test-service
  user-authentication-service:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/auth-proxy.conf:/etc/nginx/nginx.conf:ro
    networks:
      - testproject_default
    restart: unless-stopped

networks:
  testproject_default:
    external: true