apiVersion: v1
kind: Secret
metadata:
  name: test-service-secrets
  namespace: testproject-namespace
  labels:
    app: test-service
    environment: production
type: Opaque
stringData:
  # База данных
  ConnectionStrings__DefaultConnection: "Server=localhost;Port=5432;Database=testdb;User Id=postgres;Password=CHANGE_ME;"
  
  # JWT Authentication
  Jwt__Issuer: "TestProject"
  Jwt__Audience: "TestProjectUsers"
  Jwt__SecretKey: "CHANGE_ME_TO_A_VERY_LONG_SECRET_KEY_AT_LEAST_32_CHARS"
  Jwt__AccessTokenExpirationMinutes: "60"
  Jwt__RefreshTokenExpirationDays: "7"
  
  # Внешние API ключи (примеры)
  ExternalApis__SomeService__ApiKey: "CHANGE_ME"
  ExternalApis__SomeService__BaseUrl: "https://api.someservice.com"
  
  # Email/SMTP настройки
  Smtp__Host: "smtp.gmail.com"
  Smtp__Port: "587"
  Smtp__Username: "noreply@testproject.com"
  Smtp__Password: "CHANGE_ME"
  Smtp__EnableSsl: "true"
  Smtp__FromEmail: "noreply@testproject.com"
  Smtp__FromName: "Test Project"
  
  # Хеширование паролей
  PasswordHasher__IterationCount: "10000"
  PasswordHasher__SaltSize: "16"
  
  # Ключи шифрования
  DataProtection__ApplicationName: "TestProject"
  DataProtection__KeyIdentifier: "TestProject-DataProtection-Keys"
  
  # Кэширование
  Redis__ConnectionString: "localhost:6379,password=CHANGE_ME,ssl=False,abortConnect=False"
  Redis__InstanceName: "TestProject"
  
  # Мониторинг и логирование
  Seq__ServerUrl: "http://localhost:5341"
  Seq__ApiKey: "CHANGE_ME"
  ApplicationInsights__ConnectionString: "InstrumentationKey=CHANGE_ME;IngestionEndpoint=https://westeurope-1.in.applicationinsights.azure.com/"
  
  # Файловое хранилище
  Storage__AzureBlob__ConnectionString: "DefaultEndpointsProtocol=https;AccountName=CHANGE_ME;AccountKey=CHANGE_ME;EndpointSuffix=core.windows.net"
  Storage__AzureBlob__ContainerName: "testproject"
  
  # Оплаты/Платежи
  Stripe__SecretKey: "sk_test_CHANGE_ME"
  Stripe__PublicKey: "pk_test_CHANGE_ME"
  Stripe__WebhookSecret: "whsec_CHANGE_ME"
  
  # Другие секреты приложения
  FeatureFlags__EnableNewDashboard: "true"
  FeatureFlags__EnableExperimentalApi: "false"
  
  # Безопасность
  Security__RateLimiting__PermitLimit: "100"
  Security__RateLimiting__WindowInSeconds: "60"
  Security__RateLimiting__QueueLimit: "2"
  
  # Корсы
  Cors__AllowedOrigins: "https://localhost:3000,https://app.testproject.com"
  Cors__AllowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
  Cors__AllowedHeaders: "Content-Type,Authorization,X-Requested-With"
  Cors__AllowCredentials: "true"
---
# Secret для TLS/SSL сертификатов
apiVersion: v1
kind: Secret
metadata:
  name: test-service-tls
  namespace: testproject-namespace
  labels:
    app: test-service
    environment: production
type: kubernetes.io/tls
data:
  tls.crt: |
    LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCiAgIC # Base64 encoded certificate
  tls.key: |
    LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQogICAg # Base64 encoded private key
---
