type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: |
    eyJhdXRocyI6eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoiQ0hBTkdFX01FIiwicGFzc3dvcmQiOiJDSEFOR0VfTUUiLCJlbWFpbCI6ImNvbnRhY3RAdGVzdHByb2plY3QuY29tIn19fQ==
---
# Инструкция по использованию (comment в YAML)
# Как использовать:
# 1. Создайте файл local-secrets.yaml в безопасном месте:
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: test-service-secrets
#   namespace: testproject-namespace
# type: Opaque
# stringData:
#   ConnectionStrings__DefaultConnection: "Server=localhost;Port=5432;Database=testdb;User Id=postgres;Password=RealPassword123;"
#   Jwt__SecretKey: "a-very-long-secret-key-with-at-least-32-characters-here"
# 
# 2. Примените: kubectl apply -f local-secrets.yaml
# 
# 3. Или создайте через kubectl командой:
# kubectl create secret generic test-service-secrets \
#   --from-literal=ConnectionStrings__DefaultConnection='Server=localhost;Port=5432;Database=testdb;User Id=postgres;Password=RealPassword123;' \
#   --from-literal=Jwt__SecretKey='a-very-long-secret-key-with-at-least-32-characters-here' \
#   -n testproject-namespace
# 
# 4. Для production используйте Sealed Secrets или внешние секреты (Azure Key Vault, AWS Secrets Manager, etc.)