services:
  # ==================== POSTGRESQL ====================
  postgres-test:
    container_name: testproject-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== TEST SERVICE (.NET) ====================
  test-service:
    container_name: testproject-test-service
    build:
      context: ./apps/test-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
      - "5001:443"  # HTTPS порт
    
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080;https://+:443
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: password
      
      # Connection string для PostgreSQL
      ConnectionStrings__DefaultConnection: Host=postgres-test;Port=5432;Database=testdb;Username=test_user;Password=test123
      
      # Безопасность
      JWT__Secret: your_super_secret_jwt_key_change_in_production
      JWT__ExpiresIn: 7d
      
      # CORS
      CORS__Origins: http://localhost:5000,http://localhost:3000
      
      # Настройки приложения
      AppSettings__LessonsPerPage: 20
      AppSettings__CoursesPerPage: 10
    
    volumes:
      # Для разработки: монтируем исходный код
      - ./apps/test-service:/src
      - ~/.nuget/packages:/root/.nuget/packages:ro
      - ~/.aspnet/https:/root/.aspnet/https:ro
    
    networks:
      - testproject-network
    
    depends_on:
      postgres-test:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== PGADMIN ====================
  pgadmin-test:
    container_name: testproject-pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@testproject.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    
    networks:
      - testproject-network
    
    depends_on:
      - postgres-test

  # ==================== REDIS ====================
  redis-test:
    container_name: testproject-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    
    command: redis-server --appendonly yes --requirepass redis123
    
    volumes:
      - redis_data:/data
    
    networks:
      - testproject-network

# ============= СЕТИ =============
networks:
  testproject-network:
    driver: bridge
    name: testproject-network

# ============= VOLUMES =============
volumes:
  postgres_data:
    name: testproject-postgres-data
  redis_data:
    name: testproject-redis-data
  pgadmin_data:
    name: testproject-pgadmin-data