# Привязка роли view для просмотра ресурсов (для разработчиков)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: testproject-view-binding
  labels:
    app.kubernetes.io/name: testproject
    app.kubernetes.io/component: view-binding
    app.kubernetes.io/part-of: testproject
  annotations:
    description: "Привязка стандартной роли view для разработчиков"
    created-by: "kustomize"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view  # Стандартная роль Kubernetes для просмотра
subjects:
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io
---
