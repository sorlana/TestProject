roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: testproject-backup-role
subjects:
  - kind: ServiceAccount
    name: testproject-backup-service-account
    namespace: testproject-namespace
---
# Привязка для миграций БД
