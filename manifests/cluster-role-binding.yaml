apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: testproject-app-binding
  labels:
    app.kubernetes.io/name: testproject
    app.kubernetes.io/component: cluster-role-binding
    app.kubernetes.io/part-of: testproject
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "Привязка роли testproject-app-role к сервисному аккаунту приложения"
    created-by: "kustomize"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: testproject-app-role
subjects:
  - kind: ServiceAccount
    name: testproject-service-account
    namespace: testproject-namespace
---
# Привязка для задач бэкапа
