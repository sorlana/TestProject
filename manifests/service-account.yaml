    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: testproject
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "ServiceAccount для выполнения миграций базы данных"
    created-by: "kustomize"
---
apiVersion: v1
kind: ServiceAccount
metadata:
