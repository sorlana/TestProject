apiVersion: v1
kind: ServiceAccount
metadata:
  name: testproject-service-account
  namespace: testproject-namespace
  labels:
    app.kubernetes.io/name: testproject
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: testproject
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "ServiceAccount для приложения TestProject"
    created-by: "kustomize"
    last-updated: "2024-01-01"
    kubernetes.io/description: "Сервисный аккаунт для микросервиса test-service"
automountServiceAccountToken: true  # Автоматическое монтирование токена в поды
---
# Дополнительные ServiceAccount для специфичных задач
apiVersion: v1
kind: ServiceAccount
metadata:
  name: testproject-backup-service-account
  namespace: testproject-namespace
  labels:
    app.kubernetes.io/name: testproject
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: testproject
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "ServiceAccount для задач бэкапа и восстановления"
    created-by: "kustomize"
automountServiceAccountToken: false  # Отключаем автомонтирование для безопасности
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: testproject-migration-service-account
