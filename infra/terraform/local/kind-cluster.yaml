# kind-cluster.yaml
# Конфигурация локального Kubernetes кластера с использованием Kind
# Для запуска: kind create cluster --config kind-cluster.yaml --name testproject-cluster

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: testproject-cluster

# Версия Kubernetes
nodes:
  - role: control-plane
    image: kindest/node:v1.27.3@sha256:3966ac761ae0136263ffdb6cfd4db23ef8a83cba8a463690e98317add2c9ba72
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true,node-type=control-plane"
    extraPortMappings:
      # Порт для Ingress Controller (nginx)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      
      # Порт для приложения (NodePort)
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
      
      # Порт для PostgreSQL (для внешнего подключения)
      - containerPort: 30002
        hostPort: 30002
        protocol: TCP
      
      # Порт для мониторинга (Grafana)
      - containerPort: 30003
        hostPort: 30003
        protocol: TCP
      
      # Порт для мониторинга (Prometheus)
      - containerPort: 30004
        hostPort: 30004
        protocol: TCP
      
      # Порт для Dashboard
      - containerPort: 30005
        hostPort: 30005
        protocol: TCP

  - role: worker
    image: kindest/node:v1.27.3@sha256:3966ac761ae0136263ffdb6cfd4db23ef8a83cba8a463690e98317add2c9ba72
    labels:
      node-type: worker
      storage: ssd
    extraMounts:
      # Монтирование локальных директорий для персистентного хранения
      - hostPath: ./data/postgres
        containerPath: /var/lib/postgresql/data
        readOnly: false
      - hostPath: ./data/redis
        containerPath: /var/lib/redis/data
        readOnly: false
      - hostPath: ./data/prometheus
        containerPath: /prometheus
        readOnly: false
      - hostPath: ./data/grafana
        containerPath: /var/lib/grafana
        readOnly: false

# Конфигурация сети
networking:
  # Используем Calico для Network Policies
  disableDefaultCNI: false  # Kind использует kindnet по умолчанию
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  ipFamily: ipv4

# Функциональности Kubernetes
featureGates:
  EphemeralContainers: true
  APIPriorityAndFairness: true

# Настройки kube-proxy
kubeProxy:
  mode: iptables  # или ipvs

# Настройки API сервера
controlPlaneEndpoint: "127.0.0.1:6443"

# Настройки etcd
etcd:
  local:
    dataDir: /var/lib/etcd

# Конфигурация для автоматической установки компонентов
# Включаем установку Ingress контроллера, мониторинга и др.
kubeadmConfigPatches:
  - |
    apiVersion: kubeadm.k8s.io/v1beta3
    kind: ClusterConfiguration
    metadata:
      name: config
    apiServer:
      extraArgs:
        enable-admission-plugins: "NodeRestriction,PodSecurityPolicy,NamespaceLifecycle,ServiceAccount"
        audit-log-path: /var/log/kubernetes/audit.log
        audit-policy-file: /etc/kubernetes/audit-policy.yaml
      extraVolumes:
        - name: "audit-log"
          hostPath: "/var/log/kubernetes"
          mountPath: "/var/log/kubernetes"
          readOnly: false
        - name: "audit-policy"
          hostPath: "/etc/kubernetes/audit-policy.yaml"
          mountPath: "/etc/kubernetes/audit-policy.yaml"
          readOnly: true
    controllerManager:
      extraArgs:
        bind-address: "0.0.0.0"
        node-cidr-mask-size: "24"
    scheduler:
      extraArgs:
        bind-address: "0.0.0.0"

# Настройки containerd (для локального registry)
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
      endpoint = ["http://kind-registry:5000"]
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
      endpoint = ["https://registry-1.docker.io"]

# Конфигурация локального Docker registry
# Для использования локальных образов без загрузки в публичный registry
- apiVersion: kind.x-k8s.io/v1alpha4
  kind: Cluster
  containerdConfigPatches:
    - |-
      [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
        endpoint = ["http://kind-registry:5000"]

# Добавляем конфигурацию для LoadBalancer (MetalLB)
- apiVersion: kind.x-k8s.io/v1alpha4
  kind: Cluster
  nodes:
    - role: control-plane
      kubeadmConfigPatches:
        - |
          kind: InitConfiguration
          nodeRegistration:
            kubeletExtraArgs:
              node-labels: "ingress-ready=true"
      extraPortMappings:
        - containerPort: 30000
          hostPort: 30000
          listenAddress: "0.0.0.0"
          protocol: tcp

# Скрипт инициализации кластера (добавляется после создания)
# Этот патч добавляет начальные ресурсы в кластер
kubeadmConfigPatches:
  - |
    apiVersion: kubeadm.k8s.io/v1beta3
    kind: ClusterConfiguration
    metadata:
      name: config
    kubernetesVersion: v1.27.3
    apiServer:
      certSANs:
        - localhost
        - 127.0.0.1
        - 0.0.0.0
        - host.docker.internal
    networking:
      podSubnet: "10.244.0.0/16"
      serviceSubnet: "10.96.0.0/12"
    etcd:
      local:
        dataDir: /var/lib/etcd
    controllerManager:
      extraArgs:
        node-cidr-mask-size: "24"
        allocate-node-cidrs: "true"

# Дополнительные настройки для локальной разработки
---
# Конфигурация для автоматического развертывания Ingress Controller
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
        apiVersion: kubeadm.k8s.io/v1beta3
        networking:
          serviceSubnet: "10.0.0.0/16"
---
# Конфигурация для StorageClass (локальное хранилище)
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
---
# Конфигурация для локальных PersistentVolumes
# (Генерируется динамически при запуске кластера)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /data/postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - testproject-cluster-worker

# Дополнительные worker ноды (опционально, для распределения нагрузки)
nodes:
  - role: worker
    image: kindest/node:v1.27.3@sha256:3966ac761ae0136263ffdb6cfd4db23ef8a83cba8a463690e98317add2c9ba72
    labels:
      node-type: worker
      storage: ssd
  - role: worker
    image: kindest/node:v1.27.3@sha256:3966ac761ae0136263ffdb6cfd4db23ef8a83cba8a463690e98317add2c9ba72
    labels:
      node-type: worker
      storage: hdd