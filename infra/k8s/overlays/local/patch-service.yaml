apiVersion: v1
kind: Service
metadata:
  name: test-service
  namespace: testproject-namespace
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: test-service
---
# Service для порт-форвардинга (опционально)
apiVersion: v1
kind: Service
metadata:
  name: test-service-nodeport
  namespace: testproject-namespace
spec:
  type: NodePort
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
  selector:
    app: test-service
---
# Service для PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: testproject-namespace
spec:
  type: ClusterIP
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
  selector:
    app: postgres
---
# Service для порт-форвардинга PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  namespace: testproject-namespace
spec:
  type: NodePort
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    nodePort: 30090
    protocol: TCP
  selector:
    app: postgres