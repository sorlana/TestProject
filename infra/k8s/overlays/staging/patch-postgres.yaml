# Патч для PostgreSQL в staging
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: testproject-namespace-staging
spec:
  replicas: 1  # Только одна реплика в staging
  template:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        env:
        - name: POSTGRES_MAX_CONNECTIONS
          value: "50"
        - name: POSTGRES_SHARED_BUFFERS
          value: "256MB"
        - name: POSTGRES_EFFECTIVE_CACHE_SIZE
          value: "768MB"
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      resources:
        requests:
          storage: 10Gi  # Меньше хранилища чем в prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: testproject-namespace-staging
data:
  POSTGRES_MAX_CONNECTIONS: "50"
  POSTGRES_SHARED_BUFFERS: "256MB"
  POSTGRES_EFFECTIVE_CACHE_SIZE: "768MB"
  POSTGRES_WORK_MEM: "8MB"
  POSTGRES_MAINTENANCE_WORK_MEM: "64MB"