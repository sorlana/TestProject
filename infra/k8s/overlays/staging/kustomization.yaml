apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Наследуем конфигурацию из base
resources:
  - ../../base/namespace/
  - ../../base/postgres/
  - ../../base/networking/
  - ../../base/monitoring/

# Патчи для staging окружения
patchesStrategicMerge:
  - patch-deployment.yaml
  - patch-postgres.yaml
  - patch-ingress.yaml
  - patch-configs.yaml

# Патчи с JSON стратегией (более гибкие изменения)
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: test-service
    path: patch-deployment-json.yaml
  - target:
      group: monitoring.coreos.com
      version: v1
      kind: PrometheusRule
      name: test-project-rules
    path: patch-prometheus-rules.yaml

# Генераторы ConfigMaps для staging
configMapGenerator:
  - name: test-service-config
    namespace: testproject-namespace
    behavior: merge
    literals:
      - ASPNETCORE_ENVIRONMENT=Staging
      - DOTNET_ENVIRONMENT=Staging
      - AppSettings__Name=TestService (Staging)
      - AppSettings__ApiTitle=TestService API - Staging Environment
      - AppSettings__ApiDescription=Pre-production environment for testing and validation
      - AppSettings__ContactEmail=qa@testproject.com
      - AppSettings__ContactUrl=https://staging.testproject.com/support
      - AppSettings__EnableSwagger=true
      - AppSettings__EnableDetailedErrors=true
      - AppSettings__EnableDeveloperExceptionPage=false
      - Cors__AllowedOrigins=https://staging.testproject.com,https://api.staging.testproject.com,http://localhost:3000
      - Cors__AllowCredentials=true
      - Database__EnableSensitiveDataLogging=false
      - Database__EnableDetailedErrors=true
      - HealthChecks__Endpoint=/health
      - HealthChecks__UIEndpoint=/health-ui
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft=Warning
      - Logging__LogLevel__System=Warning
      - RateLimiting__Enabled=true
      - RateLimiting__PermitLimit=500
      - RateLimiting__WindowInSeconds=60
      - OTEL_SERVICE_NAME=test-service-staging
      - OTEL_RESOURCE_ATTRIBUTES=service.name=test-service-staging,service.version=1.0.0,deployment.environment=staging
      - FeatureFlags__EnableSwagger=true
      - FeatureFlags__EnableMetrics=true
      - FeatureFlags__EnableHealthChecks=true
      - FeatureFlags__EnableExperimentalApi=true
      - Temporary__SeedDatabase=true
      - Temporary__RunMigrationsOnStart=true
      - Temporary__CreateTestData=false

# Генераторы Secrets для staging
secretGenerator:
  - name: test-service-secrets
    namespace: testproject-namespace
    behavior: merge
    envs:
      - .env.staging.secret
    options:
      disableNameSuffixHash: true

# Изменение образов для staging
images:
  - name: test-service
    newName: cr.yandex/${YC_REGISTRY_ID}/test-service
    newTag: staging-latest
  - name: postgres
    newName: postgres
    newTag: 15-alpine

# Настройка namespace
namespace: testproject-namespace-staging

# Общие метки для всех ресурсов в staging
commonLabels:
  environment: staging
  tier: pre-production
  managed-by: kustomize-staging
  app.kubernetes.io/environment: staging

# Общие аннотации
commonAnnotations:
  environment: staging
  deployed-by: "kustomize-staging-overlay"
  deployment-timestamp: "2024-01-01T00:00:00Z"
  change-management-ticket: "CM-"
  team: "platform-engineering"
  cost-center: "rd-staging"

# Компоненты (если используем)
components: []

# Замены переменных для staging
replacements:
  - source:
      kind: ConfigMap
      name: test-service-config
      fieldPath: data.ASPNETCORE_ENVIRONMENT
    targets:
      - select:
          kind: Deployment
          name: test-service
        fieldPaths:
          - spec.template.spec.containers.[name:test-service].env.[name:ASPNETCORE_ENVIRONMENT].value
  - source:
      kind: Secret
      name: test-service-secrets
      fieldPath: data.DB_HOST
    targets:
      - select:
          kind: Deployment
          name: test-service
        fieldPaths:
          - spec.template.spec.containers.[name:test-service].env.[name:ConnectionStrings__DefaultConnection].valueFrom.secretKeyRef.key

# Генераторы для мониторинга staging
configMapGenerator:
  - name: grafana-dashboard-staging
    namespace: monitoring
    behavior: merge
    files:
      - dashboards/test-service-staging.json

# Настройка трансформаторов
transformers:
  - transformers/staging/

# Настройка валидаторов
validators:
  - validators/staging/

# Игнорируемые поля для kustomize
patches:
  - path: patches/staging/ignore-fields.yaml

# Список ресурсов для применения (сортировка для правильного порядка)
resources:
  # 1. Namespace и RBAC
  - ../../base/namespace/namespace.yaml
  
  # 2. Конфигурации
  - ../../base/postgres/configmap.yaml
  - ../../base/postgres/secret.yaml
  
  # 3. Хранилище
  - ../../base/postgres/pvc.yaml
  
  # 4. База данных
  - ../../base/postgres/statefulset.yaml
  - ../../base/postgres/service.yaml
  
  # 5. Приложение
  - ../../base/test-service/deployment.yaml
  - ../../base/test-service/service.yaml
  - ../../base/test-service/hpa.yaml
  
  # 6. Сеть
  - ../../base/networking/ingress.yaml
  - ../../base/networking/network-policy.yaml
  
  # 7. Мониторинг
  - ../../base/monitoring/service-monitor.yaml
  - ../../base/monitoring/pod-monitor.yaml
  - ../../base/monitoring/prometheus-rules.yaml
  
  # 8. Бэкапы (отдельный Job)
  - ../../base/postgres/backup-job.yaml

# Настройки генераторов
generatorOptions:
  disableNameSuffixHash: true
  labels:
    environment: staging
    pre-production: "true"
  annotations:
    kustomize.staging/overlay: "true"
    staging-environment: "pre-production"

# Конфигурация для кастомизации
configurations:
  - kustomizeconfig.yaml