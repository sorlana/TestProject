# Патч для Deployment в staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-service
  namespace: testproject-namespace-staging
spec:
  replicas: 2  # Меньше реплик чем в prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      containers:
      - name: test-service
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Staging"
        - name: DOTNET_ENVIRONMENT
          value: "Staging"
        - name: ASPNETCORE_URLS
          value: "http://*:8080"
        readinessProbe:
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3