apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-project-ingress
  namespace: testproject-namespace
  labels:
    app: test-project
    component: ingress
    app.kubernetes.io/name: ingress
    app.kubernetes.io/instance: test-project-ingress
    app.kubernetes.io/component: networking
  annotations:
    # Аннотации для ingress-nginx контроллера
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers: "4 64k"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-max-age: "1728000"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Для использования Let's Encrypt (cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Для использования внешнего LoadBalancer в Yandex Cloud
    yandex.cloud/load-balancer-type: "external"
    yandex.cloud/network-id: "your-network-id"
    yandex.cloud/subnet-id: "your-subnet-id"
spec:
  tls:
    - hosts:
        - api.testproject.com
        - testproject.com
      secretName: test-project-tls-secret
  rules:
    - host: api.testproject.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 8080
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 8080
    - host: testproject.com
      http:
        paths:
          - path: /()
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: test-service
                port:
                  number: 8080