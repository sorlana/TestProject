apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: testproject-namespace
  labels:
    app: postgres
    component: backup
    tier: backend
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/instance: postgres-backup-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      type: backup
      app: postgres
---
# PVC для WAL архивов (Write-Ahead Logging)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-wal-pvc
  namespace: testproject-namespace
  labels:
    app: postgres
    component: wal
    tier: backend
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast
  resources:
    requests:
      storage: 5Gi