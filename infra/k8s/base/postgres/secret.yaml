apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: testproject-namespace
  labels:
    app: postgres
    component: database
    tier: backend
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: postgres-secrets
type: Opaque
stringData:
  # Основной пароль PostgreSQL
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD_123!"
  
  # Пароль для пользователя приложения (если используется)
  APP_DB_PASSWORD: "CHANGE_ME_APP_PASSWORD_456!"
  
  # Пароль для мониторинга
  MONITORING_PASSWORD: "CHANGE_ME_MONITORING_PASSWORD_789!"
  
  # Пароль для репликации (если настраивается)
  REPLICATION_PASSWORD: "CHANGE_ME_REPLICATION_PASSWORD_101!"
  
  # Пароль для бэкапов
  BACKUP_PASSWORD: "CHANGE_ME_BACKUP_PASSWORD_112!"
  
  # Дополнительные секреты для .NET приложения
  # Connection string с паролем (формат для .NET)
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=testdb;Username=postgres;Password=CHANGE_ME_STRONG_PASSWORD_123!;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100;Connection Idle Lifetime=300;Connection Pruning Interval=10;Timeout=30;Command Timeout=30;Ssl Mode=Disable;"
  
  # Connection string для пользователя приложения
  ConnectionStrings__AppConnection: "Host=postgres;Port=5432;Database=testdb;Username=app_user;Password=CHANGE_ME_APP_PASSWORD_456!;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=50;"
  
  # SSL сертификаты (если нужно)
  # POSTGRES_SSL_CERT: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
  # 
  # POSTGRES_SSL_KEY: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...
  #   -----END PRIVATE KEY-----
  # 
  # POSTGRES_SSL_ROOT_CERT: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----