apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: test-project-rules
  namespace: testproject-namespace
  labels:
    app: test-project
    component: monitoring
    release: prometheus-stack
    role: alert-rules
spec:
  groups:
    - name: test-service.rules
      interval: 30s
      rules:
        # Правила для .NET приложения
        - record: job:aspnetcore_requests_per_second:rate5m
          expr: rate(aspnetcore_requests_total[5m])
        - record: job:aspnetcore_request_duration_seconds:avg
          expr: avg(aspnetcore_request_duration_seconds)
        - record: job:dotnet_gc_collection_seconds:rate5m
          expr: rate(dotnet_gc_collection_seconds_total[5m])
        - record: job:dotnet_memory_allocated_bytes:rate5m
          expr: rate(dotnet_memory_allocated_bytes_total[5m])
        - record: job:process_cpu_seconds:rate5m
          expr: rate(process_cpu_seconds_total[5m])
        - record: job:process_memory_usage_bytes
          expr: process_working_set_bytes
        - record: job:http_requests_duration_seconds:quantile
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service, method))
    
    - name: test-service.alerts
      rules:
        # Алерты для .NET приложения
        - alert: TestServiceHighErrorRate
          expr: rate(aspnetcore_requests_failed_total[5m]) / rate(aspnetcore_requests_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
            service: test-service
          annotations:
            summary: "Высокий процент ошибок в TestService"
            description: "TestService имеет процент ошибок {{ $value | humanizePercentage }} за последние 5 минут"
        
        - alert: TestServiceHighLatency
          expr: histogram_quantile(0.95, rate(aspnetcore_request_duration_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
            service: test-service
          annotations:
            summary: "Высокая задержка в TestService"
            description: "95-й перцентиль задержки TestService составляет {{ $value }} секунд"
        
        - alert: TestServiceHighMemoryUsage
          expr: process_working_set_bytes / (1024 * 1024 * 1024) > 1
          for: 10m
          labels:
            severity: warning
            service: test-service
          annotations:
            summary: "Высокое использование памяти в TestService"
            description: "TestService использует {{ $value | humanize }} GB памяти"
        
        - alert: TestServiceHighCPUUsage
          expr: rate(process_cpu_seconds_total[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
            service: test-service
          annotations:
            summary: "Высокая загрузка CPU в TestService"
            description: "TestService использует {{ $value | humanizePercentage }} CPU"
        
        - alert: TestServicePodCrashLooping
          expr: kube_pod_container_status_restarts_total{container="test-service"} > 5
          for: 15m
          labels:
            severity: critical
            service: test-service
          annotations:
            summary: "Контейнер TestService постоянно перезапускается"
            description: "Контейнер TestService перезапускался {{ $value }} раз"
        
        - alert: TestServiceHealthCheckFailed
          expr: up{job="test-service"} == 0
          for: 2m
          labels:
            severity: critical
            service: test-service
          annotations:
            summary: "Health check TestService не проходит"
            description: "TestService недоступен более 2 минут"
    
    - name: postgres.alerts
      rules:
        # Алерты для PostgreSQL
        - alert: PostgresHighConnections
          expr: pg_stat_activity_count > 80
          for: 5m
          labels:
            severity: warning
            service: postgres
          annotations:
            summary: "Высокое количество подключений к PostgreSQL"
            description: "PostgreSQL имеет {{ $value }} активных подключений"
        
        - alert: PostgresHighDiskUsage
          expr: pg_database_size_bytes / 1024 / 1024 / 1024 > 50
          for: 10m
          labels:
            severity: warning
            service: postgres
          annotations:
            summary: "Высокое использование диска PostgreSQL"
            description: "База данных PostgreSQL использует {{ $value | humanize }} GB"
        
        - alert: PostgresReplicationLag
          expr: pg_replication_lag > 30
          for: 5m
          labels:
            severity: critical
            service: postgres
          annotations:
            summary: "Задержка репликации PostgreSQL"
            description: "Задержка репликации PostgreSQL составляет {{ $value }} секунд"
    
    - name: infrastructure.alerts
      rules:
        # Алерты для инфраструктуры
        - alert: NodeHighMemoryUsage
          expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Высокое использование памяти на ноде"
            description: "Нода использует {{ $value | humanizePercentage }} памяти"
        
        - alert: NodeHighCPUUsage
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Высокая загрузка CPU на ноде"
            description: "Нода использует {{ $value }}% CPU"
        
        - alert: NodeDiskRunningFull
          expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Диск ноды почти заполнен"
            description: "Свободно только {{ $value | humanize }}% дискового пространства"