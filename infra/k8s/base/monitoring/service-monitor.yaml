apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: test-service-monitor
  namespace: testproject-namespace
  labels:
    app: test-service
    component: monitoring
    release: prometheus-stack
    app.kubernetes.io/name: test-service
    app.kubernetes.io/instance: test-service-monitor
    app.kubernetes.io/component: monitoring
  annotations:
    description: "ServiceMonitor для сбора метрик .NET приложения TestService"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  selector:
    matchLabels:
      app: test-service
  namespaceSelector:
    matchNames:
      - testproject-namespace
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
      honorLabels: true
      honorTimestamps: true
      metricRelabelings:
        # Оставляем только метрики .NET и приложения
        - sourceLabels: [__name__]
          regex: 'dotnet_.*|process_.*|http_.*|aspnetcore_.*'
          action: keep
        # Добавляем namespace как label
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: kubernetes_namespace
        # Добавляем pod name как label
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: kubernetes_pod_name
        # Добавляем node name как label
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: kubernetes_node
      relabelings:
        # Добавляем service name как label
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
        # Добавляем environment label
        - targetLabel: environment
          replacement: "production"
        # Добавляем app version label
        - targetLabel: version
          replacement: "1.0.0"
    - port: http
      interval: 30s
      path: /health
      scrapeTimeout: 5s
      params:
        detailed: ["true"]
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'health_.*'
          action: keep
    - port: http
      interval: 30s
      path: /health/ready
      scrapeTimeout: 5s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'health_check_status'
          action: keep
    - port: http
      interval: 30s
      path: /health/live
      scrapeTimeout: 5s
---
# ServiceMonitor для PostgreSQL метрик (если используется postgres-exporter)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-monitor
  namespace: testproject-namespace
  labels:
    app: postgres
    component: monitoring
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: postgres
      component: database
  namespaceSelector:
    matchNames:
      - testproject-namespace
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
      params:
        format: ["prometheus"]
      metricRelabelings:
        # Оставляем только важные метрики PostgreSQL
        - sourceLabels: [__name__]
          regex: 'pg_stat_.*|pg_database_.*|pg_replication_.*|pg_settings_.*'
          action: keep
        # Переименовываем метрики для удобства
        - sourceLabels: [__name__]
          targetLabel: __name__
          regex: 'pg_stat_database_([^_]+)_total'
          replacement: 'postgres_stat_database_${1}'
        - sourceLabels: [__name__]
          targetLabel: __name__
          regex: 'pg_database_size_bytes'
          replacement: 'postgres_database_size_bytes'
---
# ServiceMonitor для Ingress контроллера
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ingress-nginx-monitor
  namespace: testproject-namespace
  labels:
    app: ingress-nginx
    component: monitoring
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
  namespaceSelector:
    matchNames:
      - ingress-nginx
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'nginx_ingress_.*'
          action: keep
        - sourceLabels: [namespace, ingress]
          separator: "/"
          targetLabel: ingress
          regex: "(.+)/(.+)"
          replacement: "${2}"
---
# ServiceMonitor для Kubernetes API сервера
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-apiserver-monitor
  namespace: testproject-namespace
  labels:
    app: kube-apiserver
    component: monitoring
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      component: apiserver
      provider: kubernetes
  namespaceSelector:
    any: true
  endpoints:
    - port: https
      interval: 30s
      path: /metrics
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        insecureSkipVerify: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'apiserver_.*|etcd_.*|rest_client_.*'
          action: keep
---
# ServiceMonitor для Node Exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: node-exporter-monitor
  namespace: testproject-namespace
  labels:
    app: node-exporter
    component: monitoring
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  namespaceSelector:
    any: true
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: 'node_.*|process_.*'
          action: keep