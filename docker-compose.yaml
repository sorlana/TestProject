version: '3.8'

services:
  # ==================== POSTGRESQL ====================
  postgres-test:
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== REDIS ====================
  redis-test:
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  # ==================== TEST SERVICE (.NET) ====================
  test-service:
    container_name: ${COMPOSE_PROJECT_NAME}-test-service
    build:
      context: .
      dockerfile: apps/test-service/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${NODE_ENV:-Development}
      ASPNETCORE_URLS: http://+:8080
      
      # Переменные для строки подключения к БД (используем отдельные переменные без SSL)
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
      # Убираем SSL параметры для локальной разработки
      DB_SSL_MODE: ${SSL_MODE}
      
      # Настройки для миграций и повторных попыток
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-true}
      Database__RetryCount: ${DATABASE_RETRY_COUNT:-3}
      Database__RetryDelaySeconds: ${DATABASE_RETRY_DELAY:-5}
      
      # Безопасность
      JWT__Secret: ${JWT_SECRET}
      JWT__ExpiresIn: ${JWT_EXPIRES_IN}
      
      # CORS
      Cors__Origins: ${CORS_ORIGIN}
      
      # Redis
      Redis__Host: redis-test
      Redis__Port: ${REDIS_PORT}
      Redis__Password: ${REDIS_PASSWORD}
      
      # RabbitMQ
      RmqSettings__Host: ${RMQ_HOST}
      RmqSettings__VHost: ${RMQ_VHOST}
      RmqSettings__Login: ${RMQ_LOGIN}
      RmqSettings__Password: ${RMQ_PASSWORD}
      
      # Настройки приложения
      AppSettings__LessonsPerPage: ${APP_LESSONS_PER_PAGE:-20}
      AppSettings__CoursesPerPage: ${APP_COURSES_PER_PAGE:-10}
    
    volumes:
      - ./apps/test-service/logs:/app/logs  # Логи приложения
    
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_started
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== USER AUTHENTICATION SERVICE (.NET) ====================
  user-authentication-service:
    container_name: ${COMPOSE_PROJECT_NAME}-user-auth-service
    build:
      context: ./apps/user-authentication-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${NODE_ENV:-Development}
      ASPNETCORE_URLS: http://+:8080
      
      # Подключение к PostgreSQL
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST};Port=${DB_PORT};Database=${AUTH_DB_NAME:-auth_db};Username=${DB_USER};Password=${DB_PASSWORD};SSL Mode=${SSL_MODE}"
      
      # Настройки для миграций
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-true}
      Database__RetryCount: ${DATABASE_RETRY_COUNT:-3}
      Database__RetryDelaySeconds: ${DATABASE_RETRY_DELAY:-5}
      
      # JWT настройки
      JWT__Secret: ${JWT_SECRET}
      JWT__Issuer: ${JWT_ISSUER:-UserAuthService}
      JWT__Audience: ${JWT_AUDIENCE:-UserAuthServiceClient}
      JWT__AccessTokenExpirationMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION:-15}
      JWT__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION:-7}
      JWT__RefreshTokenExpirationDaysRememberMe: ${JWT_REFRESH_TOKEN_EXPIRATION_REMEMBER_ME:-30}
      
      # CORS
      Cors__Origins: ${CORS_ORIGIN}
      
      # Redis для кеширования и rate limiting
      Redis__Host: redis-test
      Redis__Port: ${REDIS_PORT}
      Redis__Password: ${REDIS_PASSWORD}
      Redis__Database: ${AUTH_REDIS_DB:-1}
      
      # RabbitMQ для событий
      RabbitMq__Host: ${RMQ_HOST}
      RabbitMq__VirtualHost: ${RMQ_VHOST}
      RabbitMq__UserName: ${RMQ_LOGIN}
      RabbitMq__Password: ${RMQ_PASSWORD}
      RabbitMq__Port: ${RMQ_PORT:-5672}
      
      # Google OAuth
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID}
      GoogleAuth__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      
      # SMS провайдер
      SmsProvider__ApiKey: ${SMS_PROVIDER_API_KEY}
      SmsProvider__ApiUrl: ${SMS_PROVIDER_API_URL}
      SmsProvider__SenderName: ${SMS_PROVIDER_SENDER_NAME:-AuthService}
      
      # nopCommerce интеграция
      NopCommerce__BaseUrl: ${NOPCOMMERCE_BASE_URL}
      NopCommerce__ApiKey: ${NOPCOMMERCE_API_KEY}
      NopCommerce__TimeoutSeconds: ${NOPCOMMERCE_TIMEOUT:-30}
      NopCommerce__RetryCount: ${NOPCOMMERCE_RETRY_COUNT:-3}
      
      # Rate Limiting
      RateLimiting__UserLoginAttempts: ${RATE_LIMIT_USER_ATTEMPTS:-5}
      RateLimiting__UserLoginWindowMinutes: ${RATE_LIMIT_USER_WINDOW:-15}
      RateLimiting__UserLockoutMinutes: ${RATE_LIMIT_USER_LOCKOUT:-15}
      RateLimiting__IpLoginAttempts: ${RATE_LIMIT_IP_ATTEMPTS:-20}
      RateLimiting__IpLoginWindowMinutes: ${RATE_LIMIT_IP_WINDOW:-60}
      RateLimiting__IpLockoutMinutes: ${RATE_LIMIT_IP_LOCKOUT:-60}
      
      # Подтверждение телефона
      PhoneVerification__CodeLength: ${PHONE_CODE_LENGTH:-6}
      PhoneVerification__CodeExpirationMinutes: ${PHONE_CODE_EXPIRATION:-10}
      PhoneVerification__MaxSendsPerHour: ${PHONE_MAX_SENDS_PER_HOUR:-3}
    
    volumes:
      - ./apps/user-authentication-service/logs:/app/logs
    
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_started

  # ==================== LANDING CMS (.NET + PIRANHA CMS) ====================
  landing-cms:
    container_name: ${COMPOSE_PROJECT_NAME}-landing-cms
    build:
      context: ./apps/landing-cms
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${LANDING_CMS_PORT:-3000}:80"
    environment:
      ASPNETCORE_ENVIRONMENT: ${NODE_ENV:-Development}
      ASPNETCORE_URLS: http://+:80
      
      # Подключение к PostgreSQL (используем схему public)
      ConnectionStrings__PiranhaDb: "Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};SSL Mode=${SSL_MODE}"
      
      # Настройки для миграций
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-true}
      Database__RetryCount: ${DATABASE_RETRY_COUNT:-3}
      Database__RetryDelaySeconds: ${DATABASE_RETRY_DELAY:-5}
      
      # Piranha CMS настройки
      Piranha__MediaCDN: ${PIRANHA_MEDIA_CDN:-}
      
      # Логирование
      Logging__LogLevel__Default: ${LOG_LEVEL:-Information}
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Piranha: Information
    
    volumes:
      - ./apps/landing-cms/logs:/app/logs
    
    depends_on:
      postgres-test:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== USER PORTAL (REACT SPA) ====================
  user-portal:
    container_name: ${COMPOSE_PROJECT_NAME}-user-portal
    build:
      context: ./apps/user-portal
      dockerfile: Dockerfile.direct
    restart: unless-stopped
    ports:
      - "${USER_PORTAL_PORT:-3001}:80"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      user-authentication-service:
        condition: service_started
    networks:
      - default

  # ==================== PGADMIN (ОПЦИОНАЛЬНО) ====================
  pgadmin-test:
    container_name: ${COMPOSE_PROJECT_NAME}-pgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres-test
    profiles: ["pgadmin"]

# ============= VOLUMES =============
volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME}-postgres-data
  redis_data:
    name: ${COMPOSE_PROJECT_NAME}-redis-data
  pgadmin_data:
    name: ${COMPOSE_PROJECT_NAME}-pgadmin-data

# ============= NETWORKS =============
networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}_default
    driver: bridge